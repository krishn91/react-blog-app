version: '3'

services:
  frontend:
    build: .
    ports:
      - "80:3000"
    command: serve -s build -l 3000

  backend:
    image: node:18
    container_name: json-server
    working_dir: /app
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: sh -c "npm install -g json-server && json-server --watch /app/data/db.json --host 0.0.0.0 --port 8000"
