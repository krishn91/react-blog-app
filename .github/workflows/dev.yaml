name: Dev Deployment

on:
  push:
    branches: [dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure Container Registry
        run: |
          echo "${{ secrets.AZURE_REGISTRY_PASSWORD }}" | docker login ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }} -u ${{ secrets.AZURE_REGISTRY_USERNAME }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/react-blog:dev .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/react-blog:dev

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo apt update

            # Install Docker if not present
            if ! command -v docker &> /dev/null
            then
              sudo apt install -y docker.io
            fi

            sudo systemctl start docker

            # Login to ACR
            docker login ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }} -u ${{ secrets.AZURE_REGISTRY_USERNAME }} -p ${{ secrets.AZURE_REGISTRY_PASSWORD }}

            # Pull latest image
            docker pull ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/react-blog:dev

            # Stop old container
            docker stop react-blog || true
            docker rm react-blog || true

            # Run new container
            docker run -d -p 80:3000 --name react-blog ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/react-blog:dev