name: Dev Deployment

on:
  push:
    branches: [dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure Container Registry
        run: |
          echo "${{ secrets.AZURE_REGISTRY_PASSWORD }}" | docker login ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }} -u ${{ secrets.AZURE_REGISTRY_USERNAME }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/react-blog:dev .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/react-blog:dev

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo apt update

            # Install Docker if not present
            if ! command -v docker &> /dev/null
            then
              sudo apt install -y docker.io
            fi

            sudo systemctl start docker

            # Login to ACR
            sudo docker login ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }} -u ${{ secrets.AZURE_REGISTRY_USERNAME }} -p ${{ secrets.AZURE_REGISTRY_PASSWORD }}

            # Pull latest image
            sudo docker pull ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/react-blog:dev

            # Stop old container
            sudo docker stop react-blog || true
            sudo docker rm react-blog || true

            # Run new container
            # install docker-compose if not present
            if [ ! -d "app" ]; then
              git clone https://github.com/krishn91/react-blog-app.git
            fi

            cd app
            git pull origin dev
            if ! command -v docker-compose &> /dev/null
            then
              sudo apt install -y docker-compose
            fi

            # clean old containers
            sudo docker stop react-blog || true
            sudo docker rm react-blog || true

            # pull latest image
            sudo docker pull ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/react-blog:dev

            # run using docker-compose
            sudo docker-compose down || true
            sudo docker-compose up -d